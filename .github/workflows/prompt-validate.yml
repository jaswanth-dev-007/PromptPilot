name: Prompt Validation

on:
  push:
    branches: [main]
    paths:
      - 'docs/**'
      - 'templates/**'
  pull_request:
    paths:
      - 'docs/**'
      - 'templates/**'
  schedule:
    - cron: '0 6 * * 1'

jobs:
  validate-prompts:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'

      - run: pnpm install --frozen-lockfile
      - run: pnpm run build
      - run: pnpm test -- --testPathPattern='packages/validators/test/'
      - name: Snapshot check
        run: npx vitest run --update=false
