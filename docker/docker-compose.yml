services:
  mongodb:
    image: mongo:7
    ports:
      - '27017:27017'
    volumes:
      - ./data/mongo:/data/db
    environment:
      MONGO_INITDB_DATABASE: promptpilot

  mongo-express:
    image: mongo-express:1
    ports:
      - '8081:8081'
    depends_on:
      - mongodb
    environment:
      ME_CONFIG_MONGODB_URL: mongodb://mongodb:27017/
